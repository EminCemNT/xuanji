<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 塔罗占卜 · 玄机阁</title>
  <meta name="description" content="多种专题牌阵，AI智能深度解读塔罗牌义。爱情、事业、成长，完全免费。" />
  <meta property="og:title" content="AI 塔罗占卜 · 玄机阁" />
  <meta property="og:description" content="多种专题牌阵，AI智能深度解读塔罗牌义，完全免费。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://emincemnt.github.io/xuanji/tarot.html" />
  <style>
    :root {
      --bg-deep:    #0d0e1f;
      --bg-mid:     #1a1b3c;
      --gold:       #d4af37;
      --gold-light: #f0d060;
      --moon:       #f5f0e8;
      --text-main:  #e8e0f0;
      --text-sub:   #a09ab8;
      --glass-bg:   rgba(26, 27, 60, 0.65);
      --glass-border: rgba(212, 175, 55, 0.25);
      --radius:     16px;
      --purple:     #7b5ea7;
      --purple-light: #a78bca;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: var(--bg-deep);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== 背景星空 ===== */
    .stars {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .star {
      position: absolute; width: 2px; height: 2px; background: #fff;
      border-radius: 50%; animation: twinkle 3s infinite alternate;
    }
    @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 0.8; } }

    /* ===== 顶部 ===== */
    .header {
      position: relative; z-index: 1; text-align: center;
      padding: 24px 20px 12px;
    }
    .header h1 {
      font-size: 22px; color: var(--gold);
      letter-spacing: 4px; margin-bottom: 4px;
    }
    .header p { font-size: 13px; color: var(--text-sub); }

    /* ===== 返回 ===== */
    .back-btn {
      position: absolute; left: 16px; top: 24px;
      color: var(--gold); text-decoration: none; font-size: 20px; z-index: 2;
    }

    /* ===== 页面容器 ===== */
    .page {
      display: none; position: relative; z-index: 1;
      padding: 16px 20px 100px; animation: fadeUp 0.4s ease;
    }
    .page.active { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== 步骤1: 选择问题类型 ===== */
    .question-types {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-top: 16px;
    }
    .q-type {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 20px 16px; text-align: center;
      cursor: pointer; transition: all 0.3s;
    }
    .q-type:hover, .q-type.selected {
      border-color: var(--gold); transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
    }
    .q-type.selected { background: rgba(212, 175, 55, 0.1); }
    .q-type-icon { font-size: 36px; margin-bottom: 8px; }
    .q-type-title { font-size: 15px; color: var(--text-main); margin-bottom: 4px; }
    .q-type-desc { font-size: 12px; color: var(--text-sub); }

    /* 自定义问题输入 */
    .custom-input-wrap {
      margin-top: 16px; display: none;
    }
    .custom-input-wrap.show { display: block; }
    .custom-input {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: 1px solid var(--glass-border); background: var(--glass-bg);
      color: var(--text-main); font-size: 14px; outline: none;
      resize: none;
    }
    .custom-input::placeholder { color: var(--text-sub); }
    .custom-input:focus { border-color: var(--gold); }

    /* ===== 步骤2: 选牌 ===== */
    .spread-select {
      display: flex; gap: 12px; margin: 16px 0 24px; justify-content: center;
    }
    .spread-option {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 16px 20px; text-align: center;
      cursor: pointer; transition: all 0.3s; flex: 1; max-width: 160px;
    }
    .spread-option:hover, .spread-option.selected {
      border-color: var(--gold); transform: translateY(-2px);
    }
    .spread-option.selected { background: rgba(212, 175, 55, 0.1); }
    .spread-option .so-icon { font-size: 28px; }
    .spread-option .so-title { font-size: 14px; margin: 6px 0 2px; }
    .spread-option .so-desc { font-size: 11px; color: var(--text-sub); }
    .spread-option .so-price { font-size: 12px; color: var(--gold); margin-top: 6px; }

    /* ===== 选牌界面 ===== */
    .card-pool {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
      margin: 16px 0;
    }
    .tarot-card-back {
      width: 58px; height: 90px; border-radius: 8px;
      background: linear-gradient(135deg, #2a1b4e, #1a2a5e);
      border: 2px solid var(--purple);
      cursor: pointer; transition: all 0.3s; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .tarot-card-back::after {
      content: '✦'; font-size: 20px; color: var(--gold);
    }
    .tarot-card-back:hover {
      transform: translateY(-4px);
      box-shadow: 0 4px 16px rgba(123, 94, 167, 0.4);
    }
    .tarot-card-back.selected {
      border-color: var(--gold);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
      transform: translateY(-8px);
    }
    .tarot-card-back.selected::after { content: '✧'; }

    .pick-hint {
      text-align: center; color: var(--gold); font-size: 14px;
      margin: 12px 0; min-height: 20px;
    }

    /* ===== 翻牌动画 ===== */
    .reveal-area {
      display: flex; gap: 12px; justify-content: center; margin: 24px 0;
      flex-wrap: wrap;
    }
    .revealed-card {
      width: 100px; text-align: center;
      animation: cardReveal 0.6s ease;
    }
    @keyframes cardReveal {
      from { transform: rotateY(180deg) scale(0.8); opacity: 0; }
      to { transform: rotateY(0) scale(1); opacity: 1; }
    }
    .revealed-card .rc-img {
      width: 80px; height: 120px; border-radius: 10px; margin: 0 auto 8px;
      border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; position: relative;
    }
    .revealed-card .rc-img.reversed { opacity: 0.8; }
    .revealed-card .rc-img.reversed::after {
      content: '↻'; position: absolute; top: 4px; right: 4px;
      font-size: 12px; color: var(--gold-light);
    }
    .revealed-card .rc-name { font-size: 13px; color: var(--text-main); }
    .revealed-card .rc-pos { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

    /* ===== 解读区 ===== */
    .reading-section {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 20px; margin: 16px 0;
    }
    .reading-section h3 {
      color: var(--gold); font-size: 16px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .reading-section p {
      font-size: 14px; line-height: 1.8; color: var(--text-main);
    }
    .reading-section .card-reading {
      background: rgba(123, 94, 167, 0.1); border-radius: 12px;
      padding: 14px; margin-bottom: 12px;
      border-left: 3px solid var(--purple);
    }
    .card-reading .cr-title {
      font-size: 14px; color: var(--gold); margin-bottom: 6px;
      font-weight: 600;
    }
    .card-reading .cr-text {
      font-size: 13px; line-height: 1.7; color: var(--text-main);
    }

    /* AI 综合解读 */
    .ai-reading {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.08), rgba(123, 94, 167, 0.08));
      border: 1px solid var(--gold); border-radius: var(--radius);
      padding: 20px; margin: 16px 0; position: relative; overflow: hidden;
    }
    .ai-reading::before {
      content: ''; position: absolute; top: -50%; right: -50%;
      width: 100%; height: 100%; border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.05), transparent);
    }
    .ai-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(212, 175, 55, 0.15); border-radius: 20px;
      padding: 4px 12px; font-size: 12px; color: var(--gold); margin-bottom: 12px;
    }
    .ai-reading h3 { color: var(--gold); font-size: 16px; margin-bottom: 12px; }
    .ai-reading p {
      font-size: 14px; line-height: 2; color: var(--text-main);
      position: relative; z-index: 1;
    }
    .typing-cursor {
      display: inline-block; width: 2px; height: 16px;
      background: var(--gold); animation: blink 0.8s infinite;
      vertical-align: middle; margin-left: 2px;
    }
    @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

    /* ===== 付费解锁 ===== */
    .pay-wall {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: var(--radius); padding: 24px; text-align: center;
      margin: 20px 0; position: relative; overflow: hidden;
    }
    .pay-wall::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--purple-light), var(--gold));
    }
    .pw-icon { font-size: 40px; margin-bottom: 12px; }
    .pw-title { font-size: 16px; color: var(--gold); margin-bottom: 8px; }
    .pw-desc { font-size: 13px; color: var(--text-sub); margin-bottom: 16px; line-height: 1.6; }
    .pw-price {
      font-size: 28px; color: var(--gold-light); font-weight: 700;
      margin-bottom: 16px;
    }
    .pw-price span { font-size: 14px; color: var(--text-sub); font-weight: 400; }
    .pay-btn {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--bg-deep); border: none; border-radius: 24px;
      padding: 12px 40px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.3s;
    }
    .pay-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4); }
    .pw-features {
      display: flex; gap: 16px; justify-content: center; margin-top: 16px;
    }
    .pw-feat { font-size: 12px; color: var(--text-sub); }
    .pw-feat::before { content: '✓ '; color: var(--gold); }

    /* ===== 按钮 ===== */
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--bg-deep); border: none; border-radius: 24px;
      padding: 14px 32px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.3s; width: 100%;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212, 175, 55, 0.4); }
    .btn-primary:disabled {
      opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none;
    }
    .btn-secondary {
      background: transparent; border: 1px solid var(--glass-border);
      color: var(--text-main); border-radius: 24px;
      padding: 12px 32px; font-size: 14px; cursor: pointer;
      transition: all 0.3s; width: 100%;
    }
    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

    .btn-row { display: flex; gap: 12px; margin-top: 16px; }
    .btn-row .btn-secondary, .btn-row .btn-primary { flex: 1; }

    /* ===== 步骤指示 ===== */
    .steps {
      display: flex; justify-content: center; gap: 8px; margin: 12px 0 20px;
    }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-sub); opacity: 0.3; transition: all 0.3s;
    }
    .step-dot.active { background: var(--gold); opacity: 1; width: 24px; border-radius: 4px; }
    .step-dot.done { background: var(--gold); opacity: 0.6; }

    /* ===== 底部导航 ===== */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(13, 14, 31, 0.95); backdrop-filter: blur(12px);
      border-top: 1px solid var(--glass-border);
      display: flex; justify-content: space-around; padding: 8px 0;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      text-decoration: none; color: var(--text-sub);
      font-size: 10px; gap: 2px; padding: 4px 12px; transition: color 0.2s;
    }
    .nav-item.active { color: var(--gold); }
    .nav-icon { font-size: 20px; }

    /* ===== 每日免费提示 ===== */
    .free-hint {
      text-align: center; margin: 8px 0;
      font-size: 12px; color: var(--text-sub);
    }
    .free-hint strong { color: var(--gold); }

    /* ===== 历史记录 ===== */
    .history-item {
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      border-radius: 12px; padding: 14px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 12px; cursor: pointer;
      transition: all 0.2s;
    }
    .history-item:hover { border-color: var(--gold); }
    .hi-icon { font-size: 28px; }
    .hi-info { flex: 1; }
    .hi-q { font-size: 13px; color: var(--text-main); }
    .hi-time { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
    .hi-arrow { color: var(--text-sub); }
  </style>
</head>

// ===== 星空 =====
(function(){
  const c = document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s = document.createElement('div');
    s.className='star';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    s.style.animationDelay=Math.random()*3+'s';
    s.style.animationDuration=(2+Math.random()*3)+'s';
    c.appendChild(s);
  }
})();

// ===== 状态 =====
let currentStep = 1;
let selectedType = null;
let selectedSpread = 1;
let selectedCards = [];
let drawnCards = [];

// ===== 选问题类型 =====
function selectType(el) {
  document.querySelectorAll('.q-type').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  selectedType = el.dataset.type;
  document.getElementById('customWrap').classList.add('show');
  document.getElementById('btnToStep2').disabled = false;
}

// ===== 选牌阵 =====
function selectSpread(el) {
  document.querySelectorAll('.spread-option').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  selectedSpread = parseInt(el.dataset.spread);
}

// ===== 步骤切换 =====
function goStep(step) {
  currentStep = step;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + step).classList.add('active');

  // 更新步骤指示
  document.querySelectorAll('.step-dot').forEach((d, i) => {
    d.classList.remove('active', 'done');
    if (i + 1 === step) d.classList.add('active');
    else if (i + 1 < step) d.classList.add('done');
  });

  // 选牌步骤：生成牌池
  if (step === 3) {
    generateCardPool();
  }
}

// ===== 生成牌池 =====
function generateCardPool() {
  selectedCards = [];
  const pool = document.getElementById('cardPool');
  pool.innerHTML = '';
  const count = 22; // 显示22张大阿卡纳背面
  for (let i = 0; i < count; i++) {
    const card = document.createElement('div');
    card.className = 'tarot-card-back';
    card.dataset.idx = i;
    card.onclick = () => pickCard(card, i);
    pool.appendChild(card);
  }
  updatePickHint();
  document.getElementById('btnReveal').disabled = true;
}

// ===== 选牌 =====
function pickCard(el, idx) {
  if (selectedCards.includes(idx)) {
    selectedCards = selectedCards.filter(i => i !== idx);
    el.classList.remove('selected');
  } else {
    if (selectedCards.length >= selectedSpread) return;
    selectedCards.push(idx);
    el.classList.add('selected');
  }
  updatePickHint();
  document.getElementById('btnReveal').disabled = selectedCards.length !== selectedSpread;
}

function updatePickHint() {
  const hint = document.getElementById('pickHint');
  const remaining = selectedSpread - selectedCards.length;
  if (remaining > 0) {
    hint.textContent = `请再选择 ${remaining} 张牌`;
  } else {
    hint.textContent = '已选满，点击「揭示命运」';
  }
}

// ===== 揭牌 =====
function revealCards() {
  // 基于日期+问题类型生成稳定的牌
  const today = new Date();
  const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();

  drawnCards = [];
  const usedIds = new Set();

  for (let i = 0; i < selectedSpread; i++) {
    let cardId = (seed * (i + 1) * 7 + selectedCards[i] * 13) % 22;
    while (usedIds.has(cardId)) cardId = (cardId + 1) % 22;
    usedIds.add(cardId);

    const isReversed = ((seed + i * 17 + selectedCards[i] * 3) % 5) < 2;
    drawnCards.push({
      card: MAJOR_ARCANA[cardId],
      reversed: isReversed,
      pos: POS_NAMES[selectedSpread][i]
    });
  }

  goStep(4);
  renderReveal();
}

// ===== 渲染揭牌 =====
function renderReveal() {
  const area = document.getElementById('revealArea');
  area.innerHTML = '';

  drawnCards.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'revealed-card';
    card.style.animationDelay = (i * 0.3) + 's';
    card.innerHTML = `
      <div class="rc-img ${d.reversed ? 'reversed' : ''}" style="background:linear-gradient(135deg,#2a1b4e,#1a2a5e);">
        ${d.card.icon}
      </div>
      <div class="rc-name">${d.card.name}${d.reversed ? '（逆位）' : ''}</div>
      <div class="rc-pos">${d.pos}</div>
    `;
    area.appendChild(card);
  });

  renderCardReadings();
  renderAIReading();
}

// ===== 逐牌解读 =====
function renderCardReadings() {
  const container = document.getElementById('cardReadings');
  container.innerHTML = '';

  drawnCards.forEach((d, i) => {
    const section = document.createElement('div');
    section.className = 'reading-section';
    section.style.animationDelay = (i * 0.2 + 0.5) + 's';
    section.innerHTML = `
      <h3>${d.card.icon} ${d.card.name}${d.reversed ? '（逆位）' : ''} — ${d.pos}</h3>
      <div class="card-reading">
        <div class="cr-title">关键词：${d.card.keyword}</div>
        <div class="cr-text">${d.reversed ? d.card.rev : d.card.up}</div>
      </div>
    `;
    container.appendChild(section);
  });
}

// ===== AI 综合解读 =====
function renderAIReading() {
  const tpl = READING_TEMPLATES[selectedType];
  const summary = tpl.summaries[Math.floor(Math.random() * tpl.summaries.length)];

  // 替换模板变量
  let text = summary;
  const firstCard = drawnCards[0];
  const midCard = drawnCards[Math.floor(drawnCards.length / 2)];
  text = text.replace(/{card_name}/g, firstCard.card.name)
             .replace(/{pos}/g, midCard.pos)
             .replace(/{keyword}/g, firstCard.card.keyword.split('·')[0]);

  // 如果是多牌，补充更多内容
  if (drawnCards.length >= 3) {
    const pastCard = drawnCards[0];
    const nowCard = drawnCards[1];
    const futureCard = drawnCards[2];
    text += `\n\n过去的影响：${pastCard.card.name}告诉你，${pastCard.reversed ? pastCard.card.rev : pastCard.card.up}`;
    text += `\n\n当下的状态：${nowCard.card.name}揭示，${nowCard.reversed ? nowCard.card.rev : nowCard.card.up}`;
    text += `\n\n未来的趋势：${futureCard.card.name}预示，${futureCard.reversed ? futureCard.card.rev : futureCard.card.up}`;
  }

  if (drawnCards.length >= 5) {
    const blockCard = drawnCards[1];
    const resultCard = drawnCards[4];
    text += `\n\n⚠️ 需要注意的阻碍：${blockCard.card.name}提醒你，${blockCard.reversed ? blockCard.card.rev : blockCard.card.up}`;
    text += `\n\n✨ 最终走向：${resultCard.card.name}显示，${resultCard.reversed ? resultCard.card.rev : resultCard.card.up}`;
  }

  document.getElementById('aiTitle').textContent = tpl.title;

  // 打字机效果
  const textEl = document.getElementById('aiText');
  textEl.innerHTML = '';
  typeWriter(textEl, text, 0);
}

function typeWriter(el, text, idx) {
  if (idx <= text.length) {
    el.innerHTML = text.substring(0, idx).replace(/\n/g, '<br>') + '<span class="typing-cursor"></span>';
    setTimeout(() => typeWriter(el, text, idx + 1), 20);
  } else {
    el.innerHTML = text.replace(/\n/g, '<br>');
    // AI解读完成后自动展示深度解读
    showDeepReading();
  }
}

// ===== 深度解读（免费展示）=====
function showDeepReading() {
  const deep = DEEP_TEMPLATES[selectedType];
  const el = document.getElementById('deepReading');
  const textEl = document.getElementById('deepText');
  el.style.display = 'block';
  textEl.innerHTML = deep.replace(/\n/g, '<br>');
}

      alert('已复制到剪贴板，快去分享吧！');

}
